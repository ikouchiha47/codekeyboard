<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Codeboard – Sofle Choc v2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: #111; color: #ddd;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100%; max-width: 700px; margin: 0 auto;
    padding: 6px;
  }
  #output-area {
    flex: 0 0 auto; height: 100px;
    margin-bottom: 6px; border-radius: 8px; overflow: hidden;
  }
  #output-area textarea {
    width: 100%; height: 100%;
    background: #1a1a1a; color: #d4d4d4;
    border: 1px solid #333; border-radius: 8px;
    padding: 10px; font-size: 15px; font-family: monospace;
    resize: none; outline: none; tab-size: 4;
    line-height: 1.5;
  }
  #output-area textarea::selection { background: #264f78; }

  #suggestions {
    display: flex; gap: 6px; align-items: center;
    padding: 4px 8px; margin-bottom: 4px;
    min-height: 32px;
    background: #1e1e1e; border-radius: 6px;
    border: 1px solid #333;
  }
  #suggestions .sug {
    flex: 1; text-align: center;
    padding: 4px 8px; border-radius: 4px;
    font-size: 13px; font-family: monospace;
    color: #999; background: transparent;
    cursor: pointer; border: none; outline: none;
    transition: background 0.08s, color 0.08s;
  }
  #suggestions .sug:active { background: #333; color: #fff; }
  #suggestions .sug.match { color: #d4d4d4; }
  #suggestions .sug.best { color: #4a9eff; font-weight: 600; }

  #status-bar {
    display: flex; gap: 10px; align-items: center;
    padding: 3px 6px; margin-bottom: 3px;
    font-size: 10px; color: #666;
  }
  #status-bar .mod-indicator {
    padding: 2px 6px; border-radius: 3px;
    font-weight: 600; font-size: 9px;
    background: #222; color: #555;
  }
  #status-bar .mod-indicator.active { background: #264f78; color: #7ab8ff; }

  #layout-name {
    margin-left: auto; font-size: 10px; color: #555; font-style: italic;
  }

  #keyboard {
    padding: 6px; background: #1a1a1a; border-radius: 10px;
    border: 1px solid #333;
  }
  .kb-split {
    display: flex; flex-direction: row; gap: 12px;
  }
  .kb-half {
    display: flex; flex-direction: column; gap: 5px;
    flex: 1;
  }
  .kb-row {
    display: flex; flex-direction: row; gap: 4px;
  }
  .key {
    display: flex; align-items: center; justify-content: center;
    height: 44px; min-width: 0; padding: 0 3px;
    background: #2c2c2c; color: #e0e0e0;
    border: none; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    font-family: inherit;
    cursor: pointer; position: relative;
    transition: background 0.06s, transform 0.06s, box-shadow 0.06s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    outline: none;
    flex: 1 1 0;
  }
  .key:active, .key.pressed {
    background: #3a3a3a !important;
    transform: scale(0.94);
  }
  .key.special { background: #252525; color: #4a9eff; }
  .key.special:active, .key.special.pressed { background: #333 !important; }
  .key.latched { box-shadow: 0 0 0 2px #4a9eff, 0 1px 2px rgba(0,0,0,0.3); }
  .key.locked { background: #264f78 !important; box-shadow: 0 0 0 2px #4a9eff; }
  .key.locked.special { background: #1a3a5c !important; }
  .key .label { pointer-events: none; line-height: 1; font-size: 12px; }
  .key .sub {
    position: absolute; top: 2px; right: 4px;
    font-size: 8px; color: #777;
    pointer-events: none;
  }
  .key.thumb { background: #222; border-bottom: 2px solid #4a9eff; }

  .key.popup-show::after {
    content: attr(data-popup);
    position: absolute; bottom: calc(100% + 8px);
    left: 50%; transform: translateX(-50%);
    background: #333; color: #fff;
    padding: 4px 10px; border-radius: 4px;
    font-size: 18px; font-weight: 600;
    white-space: nowrap; pointer-events: none;
    animation: popup-fade 0.2s ease-out; z-index: 10;
  }
  @keyframes popup-fade {
    from { opacity: 0; transform: translateX(-50%) scale(0.6); }
    to { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  @media (max-width: 400px) {
    .key { height: 38px; font-size: 11px; }
    .key .label { font-size: 10px; }
    .kb-half { gap: 4px; }
    .kb-split { gap: 8px; }
    .kb-row { gap: 3px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="status-bar">
    <span class="mod-indicator" id="ind-ctrl">Ctrl</span>
    <span class="mod-indicator" id="ind-alt">Alt</span>
    <span class="mod-indicator" id="ind-shift">Shift</span>
    <span class="mod-indicator" id="ind-caps">Caps</span>
    <span class="mod-indicator" id="ind-fn">Fn</span>
    <span id="layout-name">Sofle Choc v2</span>
  </div>
  <div id="output-area">
    <textarea id="input" placeholder="Type here..." autofocus></textarea>
  </div>
  <div id="suggestions">
    <button class="sug" id="sug0"></button>
    <button class="sug" id="sug1"></button>
    <button class="sug" id="sug2"></button>
  </div>
  <div id="keyboard"></div>
</div>

<script>
const L = { NONE:0, LATCHED:1, LOCKED:2 };
const state = {
  ctrl: L.NONE, alt: L.NONE, shift: L.NONE, caps: L.NONE, fn: L.NONE,
  held: new Set(), _lastTap: {},
};
function isLetter(c) { return /^[a-zA-Z]$/.test(c); }
function isModifier(a) { return ['ctrl','alt','shift','caps','fn','meta'].includes(a); }

// ── Sofle Choc v2 Split Layout ──────────────────────────
// Column stagger offsets (in key-height units) per column
const STAGGERS = {
  left:  [0, 0.25, 0.5, 0.75, 1.0, 1.0],
  right: [1.0, 0.75, 0.5, 0.25, 0, 0, 0],
};

function key(label, col, staggerArr, opts) {
  return {k: label, stagger: (staggerArr && staggerArr[col]) || 0, ...opts};
}

const LAYOUT = {
  name: 'Sofle Choc v2',
  left: [
    // Row 0
    [key('Esc', 0, STAGGERS.left, {a:'escape'}),
     key('1', 1, STAGGERS.left, {s:'!', fn:'F1'}),
     key('2', 2, STAGGERS.left, {s:'@', fn:'F2'}),
     key('3', 3, STAGGERS.left, {s:'#', fn:'F3'}),
     key('4', 4, STAGGERS.left, {s:'$', fn:'F4'}),
     key('5', 5, STAGGERS.left, {s:'%', fn:'F5'})],
    // Row 1
    [key('Tab', 0, STAGGERS.left, {a:'tab'}),
     key('q', 1, STAGGERS.left), key('w', 2, STAGGERS.left),
     key('e', 3, STAGGERS.left), key('r', 4, STAGGERS.left),
     key('t', 5, STAGGERS.left)],
    // Row 2
    [key('Caps', 0, STAGGERS.left, {a:'caps'}),
     key('a', 1, STAGGERS.left), key('s', 2, STAGGERS.left),
     key('d', 3, STAGGERS.left), key('f', 4, STAGGERS.left),
     key('g', 5, STAGGERS.left)],
    // Row 3
    [key('Shift', 0, STAGGERS.left, {a:'shift'}),
     key('z', 1, STAGGERS.left), key('x', 2, STAGGERS.left),
     key('c', 3, STAGGERS.left), key('v', 4, STAGGERS.left),
     key('b', 5, STAGGERS.left)],
    // Row 4 – thumb row
    [key('Ctrl', 0, STAGGERS.left, {a:'ctrl'}),
     key('Alt', 1, STAGGERS.left, {a:'alt'}),
     {k:'', w:1, stagger: STAGGERS.left[2] || 0},
     key('Cmd', 3, STAGGERS.left, {a:'meta'}),
     key('Spc', 4, STAGGERS.left, {a:'space', cls:'thumb'}),
     key('Spc', 5, STAGGERS.left, {a:'space', cls:'thumb'})],
  ],
  right: [
    // Row 0
    [key('6', 0, STAGGERS.right, {s:'^', fn:'F6'}),
     key('7', 1, STAGGERS.right, {s:'&', fn:'F7'}),
     key('8', 2, STAGGERS.right, {s:'*', fn:'F8'}),
     key('9', 3, STAGGERS.right, {s:'(', fn:'F9'}),
     key('0', 4, STAGGERS.right, {s:')', fn:'F10'}),
     key('-', 5, STAGGERS.right, {s:'_', fn:'F11'}),
     key('=', 6, STAGGERS.right, {s:'+', fn:'F12'})],
    // Row 1
    [key('y', 0, STAGGERS.right), key('u', 1, STAGGERS.right),
     key('i', 2, STAGGERS.right), key('o', 3, STAGGERS.right),
     key('p', 4, STAGGERS.right),
     key('[', 5, STAGGERS.right, {s:'{'}), key(']', 6, STAGGERS.right, {s:'}'})],
    // Row 2
    [key('h', 0, STAGGERS.right), key('j', 1, STAGGERS.right),
     key('k', 2, STAGGERS.right), key('l', 3, STAGGERS.right),
     key(';', 4, STAGGERS.right, {s:':'}), key("'", 5, STAGGERS.right, {s:'"'}),
     key('Enter', 6, STAGGERS.right, {a:'enter'})],
    // Row 3
    [key('n', 0, STAGGERS.right), key('m', 1, STAGGERS.right),
     key(',', 2, STAGGERS.right, {s:'<'}), key('.', 3, STAGGERS.right, {s:'>'}),
     key('/', 4, STAGGERS.right, {s:'?'}),
     key('Shift', 5, STAGGERS.right, {a:'shift'}),
     key('Bksp', 6, STAGGERS.right, {a:'backspace'})],
    // Row 4 – thumb + mods + arrows
    [key('Spc', 0, STAGGERS.right, {a:'space', cls:'thumb'}),
     key('Spc', 1, STAGGERS.right, {a:'space', cls:'thumb'}),
     key('Fn', 2, STAGGERS.right, {a:'fn'}),
     key('Alt', 3, STAGGERS.right, {a:'alt'}),
     key('Ctrl', 4, STAGGERS.right, {a:'ctrl'}),
     key('←', 5, STAGGERS.right, {a:'arrow-left'}),
     key('→', 6, STAGGERS.right, {a:'arrow-right'})],
  ],
};

const textarea = document.getElementById('input');
const keyboardEl = document.getElementById('keyboard');

function displayChar(plain) {
  if (plain === ' ') return '\u2423';
  if (plain === 'Tab') return '\u21B9';
  return plain;
}

function makeKeyEl(spec, colIdx, isRight) {
  const key = document.createElement('button');
  key.className = 'key';
  if (spec.cls) key.classList.add(spec.cls);
  if (spec.w) key.style.flex = spec.w;
  const isMod = isModifier(spec.a);
  if (isMod) key.classList.add('special');

  if (spec.stagger) {
    key.style.marginTop = (spec.stagger * 44) + 'px';
  }

  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = displayChar(spec.k);
  key.appendChild(label);
  if (spec.s) {
    const sub = document.createElement('span');
    sub.className = 'sub';
    sub.textContent = spec.s;
    key.appendChild(sub);
  }

  key.dataset.key = spec.k;
  key.dataset.action = spec.a || '';
  if (spec.s) key.dataset.shift = spec.s;
  if (spec.alt) key.dataset.alt = spec.alt;
  if (spec.fn) key.dataset.fn = spec.fn;
  if (spec.stagger) key.dataset.stagger = spec.stagger;

  key.addEventListener('pointerdown', onKeyDown);
  key.addEventListener('pointerup', onKeyUp);
  key.addEventListener('pointerleave', onKeyLeave);
  return key;
}

function buildKeyboard() {
  keyboardEl.innerHTML = '';
  const split = document.createElement('div');
  split.className = 'kb-split';

  for (const side of ['left', 'right']) {
    const half = document.createElement('div');
    half.className = 'kb-half';
    const rows = LAYOUT[side];
    for (let ri = 0; ri < rows.length; ri++) {
      const row = rows[ri];
      const rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      for (let ci = 0; ci < row.length; ci++) {
        const spec = row[ci];
        const key = makeKeyEl(spec, ci, side === 'right');
        rowEl.appendChild(key);
      }
      half.appendChild(rowEl);
    }
    split.appendChild(half);
  }

  keyboardEl.appendChild(split);
}

let repeatTimer = null;
let repeatKey = null;

function onKeyDown(e) {
  e.preventDefault();
  const key = e.currentTarget;
  key.setPointerCapture(e.pointerId);
  const action = key.dataset.action;
  if (isModifier(action)) { handleModifierDown(key, action); return; }
  key.classList.add('pressed');
  showPopup(key);
  executeKey(key);
  clearLatchedModifiers();
  if (['backspace','arrow-left','arrow-right'].includes(action)) {
    repeatKey = key;
    repeatTimer = setTimeout(() => {
      repeatTimer = setInterval(() => { if (repeatKey) executeKey(repeatKey); }, 50);
    }, 250);
  }
}

function onKeyUp(e) {
  const key = e.currentTarget;
  try { key.releasePointerCapture(e.pointerId); } catch(_) {}
  key.classList.remove('pressed');
  const action = key.dataset.action;
  if (isModifier(action)) { handleModifierUp(key, action); return; }
  if (repeatTimer) { clearInterval(repeatTimer); clearTimeout(repeatTimer); repeatTimer = null; repeatKey = null; }
}

function onKeyLeave(e) {
  const key = e.currentTarget;
  key.classList.remove('pressed');
  try { key.releasePointerCapture(e.pointerId); } catch(_) {}
  if (repeatTimer) { clearInterval(repeatTimer); clearTimeout(repeatTimer); repeatTimer = null; repeatKey = null; }
}

function handleModifierDown(key, action) {
  state.held.add(action);
  if (state[action] === L.NONE) state[action] = L.LATCHED;
  else if (state[action] === L.LATCHED) state[action] = L.LOCKED;
  else state[action] = L.NONE;
  updateModUI();
}
function handleModifierUp(key, action) { state.held.delete(action); updateModUI(); }

function clearLatchedModifiers() {
  for (const m of ['ctrl','alt','shift','caps']) {
    if (state[m] === L.LATCHED) state[m] = L.NONE;
  }
  updateModUI();
}

function getEffectiveModifiers() {
  return {
    ctrl: state.ctrl !== L.NONE, alt: state.alt !== L.NONE,
    shift: state.shift !== L.NONE, caps: state.caps !== L.NONE, fn: state.fn !== L.NONE,
  };
}

function resolveChar(key) {
  const mod = getEffectiveModifiers();
  let ch = key.dataset.key;
  if (mod.fn && key.dataset.fn) return key.dataset.fn;
  if (mod.alt && key.dataset.alt) return key.dataset.alt;
  if (mod.shift && key.dataset.shift) ch = key.dataset.shift;
  if (isLetter(ch)) {
    const upper = (mod.shift && !mod.caps) || (!mod.shift && mod.caps);
    ch = upper ? ch.toUpperCase() : ch.toLowerCase();
  }
  return ch;
}

function executeKey(key) {
  const action = key.dataset.action;
  const mod = getEffectiveModifiers();
  if (action === 'backspace') { backspace(); return; }
  if (action === 'enter') { insertText('\n'); return; }
  if (action === 'tab') { insertText('    '); return; }
  if (action === 'space') { insertText(' '); return; }
  if (action === 'escape') { textarea.blur(); return; }
  if (action === 'arrow-left') { moveCursor(-1); return; }
  if (action === 'arrow-right') { moveCursor(1); return; }
  if (isModifier(action)) return;
  if (mod.ctrl) { handleCtrlCombo(key.dataset.key); return; }
  insertText(resolveChar(key));
}

const CTRL_COMBOS = {
  'a': () => textarea.select(), 'c': () => copySelection(),
  'v': () => pasteClipboard(), 'x': () => cutSelection(),
  'z': () => {}, 's': () => {}, 'f': () => {},
  'd': () => duplicateLine(), '/': () => toggleComment(),
};

function handleCtrlCombo(baseKey) {
  const fn = CTRL_COMBOS[baseKey.toLowerCase()];
  if (fn) fn();
}

function copySelection() {
  const sel = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);
  if (sel) navigator.clipboard.writeText(sel).catch(() => {});
}
function cutSelection() {
  const s = textarea.selectionStart, e = textarea.selectionEnd;
  if (s !== e) {
    navigator.clipboard.writeText(textarea.value.substring(s, e)).catch(() => {});
    textarea.value = textarea.value.substring(0, s) + textarea.value.substring(e);
    textarea.selectionStart = textarea.selectionEnd = s;
  }
}
function pasteClipboard() {
  navigator.clipboard.readText().then(t => insertText(t)).catch(() => {});
}
function duplicateLine() {
  const val = textarea.value;
  const start = textarea.selectionStart;
  let lineStart = val.lastIndexOf('\n', start - 1) + 1;
  if (lineStart === -1) lineStart = 0;
  let lineEnd = val.indexOf('\n', start);
  if (lineEnd === -1) lineEnd = val.length;
  const line = val.substring(lineStart, lineEnd);
  textarea.value = val.substring(0, lineEnd) + '\n' + line + val.substring(lineEnd);
  textarea.selectionStart = textarea.selectionEnd = start + line.length + 1;
}
function toggleComment() {
  const val = textarea.value, start = textarea.selectionStart;
  let lineStart = val.lastIndexOf('\n', start - 1) + 1;
  if (lineStart === -1) lineStart = 0;
  const lineEnd = val.indexOf('\n', start);
  const end = lineEnd === -1 ? val.length : lineEnd;
  const line = val.substring(lineStart, end);
  const trimmed = line.trimStart();
  const indent = line.substring(0, line.indexOf(trimmed));
  if (trimmed.startsWith('//')) {
    textarea.value = val.substring(0, lineStart) + indent + trimmed.substring(2) + val.substring(end);
    textarea.selectionStart = textarea.selectionEnd = Math.max(lineStart, start - 2);
  } else {
    textarea.value = val.substring(0, lineStart) + indent + '//' + trimmed + val.substring(end);
    textarea.selectionStart = textarea.selectionEnd = start + 2;
  }
}

function insertText(t) {
  const start = textarea.selectionStart, end = textarea.selectionEnd;
  textarea.value = textarea.value.substring(0, start) + t + textarea.value.substring(end);
  textarea.selectionStart = textarea.selectionEnd = start + t.length;
  textarea.dispatchEvent(new Event('input', {bubbles: true}));
  textarea.focus();
}
function backspace() {
  const start = textarea.selectionStart, end = textarea.selectionEnd;
  if (start !== end) {
    textarea.value = textarea.value.substring(0, start) + textarea.value.substring(end);
    textarea.selectionStart = textarea.selectionEnd = start;
  } else if (start > 0) {
    textarea.value = textarea.value.substring(0, start - 1) + textarea.value.substring(start);
    textarea.selectionStart = textarea.selectionEnd = start - 1;
  }
  textarea.dispatchEvent(new Event('input', {bubbles: true}));
  textarea.focus();
}
function moveCursor(dir) {
  const pos = textarea.selectionStart + dir;
  if (pos >= 0 && pos <= textarea.value.length) textarea.selectionStart = textarea.selectionEnd = pos;
  textarea.focus();
}

function showPopup(key) {
  if (isModifier(key.dataset.action)) return;
  const mod = getEffectiveModifiers();
  const ch = mod.ctrl ? 'Ctrl+' + key.dataset.key.toUpperCase() : resolveChar(key);
  key.dataset.popup = ch;
  key.classList.add('popup-show');
  setTimeout(() => key.classList.remove('popup-show'), 200);
}

function updateModUI() {
  for (const n of ['ctrl','alt','shift','caps','fn']) {
    const el = document.getElementById('ind-' + n);
    el.className = 'mod-indicator';
    if (state[n] === L.LATCHED || state[n] === L.LOCKED) el.classList.add('active');
    if (state[n] === L.LOCKED) { el.style.background = '#4a9eff'; el.style.color = '#fff'; }
    else { el.style.background = ''; el.style.color = ''; }
  }
  document.querySelectorAll('.key').forEach(key => {
    const a = key.dataset.action;
    key.classList.remove('latched','locked');
    if (isModifier(a) && state[a] === L.LATCHED) key.classList.add('latched');
    if (isModifier(a) && state[a] === L.LOCKED) key.classList.add('locked');
  });
}

// ── Suggestion Bar (same as QWERTY version) ────────────
const DICT = ['function','const','let','var','return','import','export','default','class','interface','type','extends','implements','async','await','if','else','for','while','do','switch','case','break','continue','try','catch','finally','throw','new','delete','typeof','instanceof','void','yield','from','of','in','as','is','keyof','readonly','static','public','private','protected','abstract','enum','module','namespace','declare','get','set','then','true','false','null','undefined','NaN','this','super','map','filter','reduce','forEach','find','some','every','includes','push','pop','shift','unshift','splice','slice','concat','join','split','indexOf','toString','require','module','exports','console','log','error','warn','debug','info','String','Number','Boolean','Array','Object','Date','RegExp','Error','Promise','JSON','Math','parseInt','parseFloat','isNaN','setTimeout','setInterval','clearTimeout','clearInterval','useState','useEffect','useRef','useMemo','useCallback','useContext','useReducer','React','Component','Fragment','createElement','cloneElement','createRef','View','Text','StyleSheet','TouchableOpacity','FlatList','ScrollView','int','float','double','char','bool','void','string','long','short','def','self','None','True','False','class','import','from','as','fn','mut','let','impl','struct','enum','trait','pub','use','mod','package','main','fmt','println','the','this','that','and','but','for','not','you','all','can','had','her','was','one','our','out','has','are','have','been','more','when','what','which','their','them','some','than','then','also','about','could','would','should','after','where','while','because','before','between','other','every','still','such','only','own','same','just','also','very','well','here','there','these','those','first','last','next','new','old','good','high','low','long','short','small','large','great','big','little','right','wrong','hard','easy','early','late','name','time','way','thing','place','year','day','week','month','part','k ctionary','stack','queue','tree','graph','node','edge','vertex','leaf','root','parent','child','sibling','depth','width','height','length','size','count','index','key','value','entry','error','exception','throw','catch','finally','debug','warn','info','trace','access','modify','update','delete','remove','insert','append','prepend','sort','search','filter','transform','aggregate','reduce','fold','scan'];
const sugEls = [document.getElementById('sug0'), document.getElementById('sug1'), document.getElementById('sug2')];

function getCurrentWord() {
  const val = textarea.value, pos = textarea.selectionStart;
  let start = pos; while (start > 0 && /[a-zA-Z0-9_]/.test(val[start - 1])) start--;
  let end = pos; while (end < val.length && /[a-zA-Z0-9_]/.test(val[end])) end++;
  return {word: val.substring(start, end).toLowerCase(), start, end};
}

function updateSuggestions() {
  const {word, start, end} = getCurrentWord();
  if (!word) { sugEls.forEach(el => { el.textContent = ''; el.className = 'sug'; }); return; }
  const matches = DICT.filter(d => d.startsWith(word) && d !== word).slice(0, 3);
  for (let i = 0; i < 3; i++) {
    const el = sugEls[i];
    if (i < matches.length) { el.textContent = matches[i]; el.className = 'sug match' + (i === 0 ? ' best' : ''); }
    else { el.textContent = ''; el.className = 'sug'; }
  }
}

function applySuggestion(sug) {
  const {word, start, end} = getCurrentWord();
  textarea.value = textarea.value.substring(0, start) + sug + ' ' + textarea.value.substring(end);
  textarea.selectionStart = textarea.selectionEnd = start + sug.length + 1;
  textarea.focus();
  updateSuggestions();
  textarea.dispatchEvent(new Event('input', {bubbles: true}));
}
sugEls.forEach((el, i) => el.addEventListener('click', () => { if (el.textContent) applySuggestion(el.textContent); }));
textarea.addEventListener('input', updateSuggestions);
textarea.addEventListener('keyup', updateSuggestions);

buildKeyboard();
textarea.focus();
updateSuggestions();

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && (e.key === 'z' || e.key === 's')) e.preventDefault();
});
</script>
