<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Keyboard Variants – Native Sizing</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a; color: #ddd;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px; padding: 16px 8px;
    -webkit-user-select: none; user-select: none;
  }
  h1 { font-size: 12px; color: #666; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .controls { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
  .pill {
    padding: 4px 10px; border-radius: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
    background: #1a1a1a; color: #555; border: 1px solid #2a2a2a;
    cursor: pointer; transition: all 0.1s;
  }
  .pill.active { background: #1a3a5c; color: #4a9eff; border-color: #4a9eff; }
  .pill:hover  { background: #252525; color: #999; }
  .sep { width: 1px; background: #2a2a2a; margin: 0 2px; }

  .phone-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .phone {
    width: 360px; background: #111;
    border: 1px solid #222; border-radius: 12px; overflow: hidden;
  }
  .info-bar {
    padding: 5px 8px; background: #0d0d0d; border-bottom: 1px solid #1a1a1a;
    font-size: 10px; color: #444; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .info-bar span { color: #4a9eff; font-weight: 700; }
  .kb-canvas { background: #111; position: relative; }

  /* keys */
  .key {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    background: #2c2c2c; border-radius: 6px;
    color: #e0e0e0; font-size: 11px; font-weight: 500;
    cursor: pointer; overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.5);
    transition: background 0.05s;
  }
  .key:active { background: #444 !important; }
  .key .lbl { pointer-events: none; line-height: 1; font-size: 11px; }
  .key .sub { position: absolute; top: 2px; right: 3px; font-size: 7px; color: #666; pointer-events: none; }

  .key.mod   { background: #252525; color: #bbb; }
  .key.thumb { background: #1a2a3a; border-bottom: 2px solid #4a9eff; }
  .key.thumb .lbl { font-size: 9px; color: #7ab8ff; }
  .key.layer { background: #162616; border-bottom: 2px solid #4caf50; }
  .key.layer .lbl { font-size: 8px; color: #81c784; font-weight: 700; }
  .key.func  { background: #2a1a1a; border-bottom: 2px solid #ff9800; }
  .key.func  .lbl { font-size: 8px; color: #ffb74d; }
  .key.util  { background: #1e1e2e; border-bottom: 2px solid #6272a4; }
  .key.util  .lbl { font-size: 10px; color: #bd93f9; }
  .key.toprow { background: #1c1c1c; border-bottom: 1px solid #333; }
  .key.toprow .lbl { font-size: 10px; color: #ccc; }
  .key.toprow.mod  { background: #1e1e1e; border-bottom: 2px solid #4a9eff; }
  .key.toprow.mod  .lbl { font-size: 9px; color: #7ab8ff; }
  .key.toprow.layer { background: #162616; border-bottom: 2px solid #4caf50; }

  /* transparent / inactive key — ZMK &trans concept */
  .key.trans {
    background: #161616;
    box-shadow: none;
    border: 1px dashed #222;
  }
  .key.trans .lbl { color: #333; font-size: 9px; }

  /* fixed anchor key — Tab / Esc, always active */
  .key.anchor { background: #202028; border-bottom: 2px solid #555; }
  .key.anchor .lbl { color: #aaa; font-size: 10px; }

  /* hold-tap keys */
  .key.ht { background: #1c1c28; }
  .key.ht .hold-lbl {
    position: absolute; bottom: 2px; left: 0; right: 0;
    text-align: center; font-size: 7px; pointer-events: none;
    letter-spacing: 0.2px;
  }
  /* home row mod colours match modifier type */
  .key.hrm-shift { border-bottom: 2px solid #ff9800; }
  .key.hrm-shift .hold-lbl { color: #ff9800; }
  .key.hrm-ctrl  { border-bottom: 2px solid #4a9eff; }
  .key.hrm-ctrl  .hold-lbl { color: #4a9eff; }
  .key.hrm-alt   { border-bottom: 2px solid #4caf50; }
  .key.hrm-alt   .hold-lbl { color: #4caf50; }
  .key.hrm-cmd   { border-bottom: 2px solid #bd93f9; }
  .key.hrm-cmd   .hold-lbl { color: #bd93f9; }
  /* layer hold */
  .key.lhold { border-bottom: 2px solid #4caf50; }
  .key.lhold .hold-lbl { color: #81c784; }

  /* legend */
  .legend {
    width: 360px; margin: 0 auto 6px;
    display: flex; gap: 8px; flex-wrap: wrap;
    font-size: 10px; color: #444;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* top-row separator line */
  .toprow-sep {
    position: absolute; left: 6px; right: 6px; height: 1px;
    background: #1e1e1e; pointer-events: none;
  }
  .gap-line {
    position: absolute; top: 0; bottom: 0;
    width: 1px; background: #1a1a1a; pointer-events: none;
  }

  .desc {
    width: 360px; margin: 0 auto 20px;
    font-size: 11px; color: #555; line-height: 1.7;
  }
  .desc strong { color: #aaa; }
  .tag {
    display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a;
    padding: 1px 5px; border-radius: 3px;
    font-size: 10px; font-family: monospace; color: #bbb; margin: 1px;
  }
  .good { color: #81c784; }
  .warn { color: #ffb74d; }
</style>
</head>
<body>

<h1>Keyboard Variants — 360px portrait · exact native sizing</h1>

<div class="controls">
  <button class="pill active" id="v-v1">V1 · 6+7 current</button>
  <button class="pill"        id="v-v2">V2 · 6+5</button>
  <button class="pill"        id="v-v3">V3 · 5+5</button>
  <button class="pill"        id="v-v4">V4 · 5+5 + top row</button>
  <button class="pill"        id="v-v5">V5 · hold-tap</button>
  <div class="sep"></div>
  <button class="pill active" id="l-base">BASE</button>
  <button class="pill"        id="l-lower">LOWER</button>
  <button class="pill"        id="l-raise">RAISE</button>
</div>

<div class="phone-wrap" id="wrap-v1"><div class="phone"><div class="info-bar" id="info-v1"></div><div class="kb-canvas" id="kb-v1"></div></div></div>
<div class="desc" id="desc-v1"></div>

<div class="phone-wrap" id="wrap-v2" style="display:none"><div class="phone"><div class="info-bar" id="info-v2"></div><div class="kb-canvas" id="kb-v2"></div></div></div>
<div class="desc" id="desc-v2" style="display:none"></div>

<div class="phone-wrap" id="wrap-v3" style="display:none"><div class="phone"><div class="info-bar" id="info-v3"></div><div class="kb-canvas" id="kb-v3"></div></div></div>
<div class="desc" id="desc-v3" style="display:none"></div>

<div class="phone-wrap" id="wrap-v4" style="display:none"><div class="phone"><div class="info-bar" id="info-v4"></div><div class="kb-canvas" id="kb-v4"></div></div></div>
<div class="desc" id="desc-v4" style="display:none"></div>

<div class="phone-wrap" id="wrap-v5" style="display:none"><div class="phone"><div class="info-bar" id="info-v5"></div><div class="kb-canvas" id="kb-v5"></div></div></div>
<div class="legend" id="legend-v5" style="display:none">
  <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>hold = Shift</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a9eff"></div>hold = Ctrl</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>hold = Alt / Layer</div>
  <div class="legend-item"><div class="legend-dot" style="background:#bd93f9"></div>hold = Cmd</div>
</div>
<div class="desc" id="desc-v5" style="display:none"></div>

<script>
// ── Constants — exact match to SofleLayoutComputer.kt ──────────────────────
const C = {
  P:   6,    // padding
  KG:  5,    // keyGap
  RG:  5,    // rowGap
  HG:  24,   // halfGap
  KH:  44,   // keyHeight
  SW:  360,  // screen width
};
const HW = (C.SW - 2*C.P - C.HG) / 2;   // half width = 162px

// ── Key builders ────────────────────────────────────────────────────────────
const k   = (l,a,s,c) => ({l, a:a||'', s:s||'', c:c||''});
const km  = (l,a)     => k(l,a||l,'','mod');
const kt  = (l,a)     => k(l,a||l,'','thumb');
const kl  = (l,a)     => k(l,a||l,'','layer');
const kf  = (l,a)     => k(l,a||l,'','func');
const _   = ()        => k('');
// hold-tap: tap=primary, hold=secondary shown as small bottom label
// hcls = hrm-shift | hrm-ctrl | hrm-alt | hrm-cmd | lhold
const kht = (tap,tapA,hold,hcls) => ({l:tap, a:tapA||tap, s:'', c:'ht '+(hcls||''), h:hold});

// ── Stagger tables ───────────────────────────────────────────────────────────
const ST = {
  L6:[0,.25,.5,.75,1,1], L5:[0,.25,.5,.75,1],
  R7:[1,.75,.5,.25,0,0,0], R5:[1,.75,.5,.25,0],
};

// ── Layout definitions ───────────────────────────────────────────────────────
const VARIANTS = {

  // V1 ── 6+7 current ─────────────────────────────────────────────────────────
  v1: { sL:ST.L6, sR:ST.R7, layers:{
    base:{
      l:[[km('Tab','tab'),k('q'),k('w'),k('e'),k('r'),k('t')],
         [km('Caps','caps'),k('a'),k('s'),k('d'),k('f'),k('g')],
         [km('Shift','shift'),k('z'),k('x'),k('c'),k('v'),k('b')],
         [km('Ctrl','ctrl'),km('Alt','alt'),kt('Spc','space'),kl('LWR','lower'),kt('Cmd','meta'),_()]],
      r:[[k('y'),k('u'),k('i'),k('o'),k('p'),k('[','','{'),k(']','','}}')],
         [k('h'),k('j'),k('k'),k('l'),k(';','',':'),k("'",'','"'),km('Enter','enter')],
         [k('n'),k('m'),k(',','','<'),k('.','','>'),k('/','','?'),km('Shift','shift'),km('Bksp','backspace')],
         [kl('RSE','raise'),kt('Spc','space'),kt('Spc','space'),kl('ADJ','adj'),kf('FUNC','func'),km('←','arrow-left'),km('→','arrow-right')]],
    },
    lower:{
      l:[[km('Esc','escape'),k('1','','!'),k('2','','@'),k('3','','#'),k('4','','$'),k('5','','%')],
         [k('`'),k('-'),k('='),k('['),k(']'),k('\\')],
         [k('~'),k('_'),k('+'),k('{'),k('}'),k('|')],
         [km('Ctrl','ctrl'),km('Alt','alt'),kt('Spc','space'),kl('LWR','lower'),_(),_()]],
      r:[[k('6','','^'),k('7','','&'),k('8','','*'),k('9','','('),k('0','',')'),k('-'),k('=')],
         [k('^'),k('&'),k('*'),k('('),k(')'),k('_'),k('+')],
         [k('!'),k('@'),k('#'),k('$'),k('%'),km('Bksp','backspace'),km('Del','delete')],
         [kl('RSE','raise'),kt('Spc','space'),_(),kl('ADJ','adj'),kf('FUNC','func'),km('←','arrow-left'),km('→','arrow-right')]],
    },
    raise:{
      l:[[k('F1'),k('F2'),k('F3'),k('F4'),k('F5'),k('F6')],
         [k('F7'),k('F8'),k('F9'),k('F10'),k('F11'),k('F12')],
         [k('PrtSc'),k('ScrLk'),k('Ins'),k('Home'),k('End'),k('PgUp')],
         [km('Ctrl','ctrl'),km('Alt','alt'),kt('Spc','space'),kl('LWR','lower'),_(),_()]],
      r:[[km('←','arrow-left'),km('↓','arrow-down'),km('↑','arrow-up'),km('→','arrow-right'),_(),_(),_()],
         [k('Home'),k('End'),k('PgUp'),k('PgDn'),_(),_(),_()],
         [k('Cut'),k('Copy'),k('Paste'),_(),_(),km('Del','delete'),km('Bksp','backspace')],
         [kl('RSE','raise'),kt('Spc','space'),_(),kl('ADJ','adj'),kf('FUNC','func'),km('←','arrow-left'),km('→','arrow-right')]],
    },
  }},

  // V2 ── 6+5 ─────────────────────────────────────────────────────────────────
  v2: { sL:ST.L6, sR:ST.R5, layers:{
    base:{
      l:[[km('Tab','tab'),k('q'),k('w'),k('e'),k('r'),k('t')],
         [km('Caps','caps'),k('a'),k('s'),k('d'),k('f'),k('g')],
         [km('Shift','shift'),k('z'),k('x'),k('c'),k('v'),k('b')],
         [km('Ctrl','ctrl'),km('Alt','alt'),kt('Spc','space'),kl('LWR','lower'),kt('Cmd','meta'),_()]],
      r:[[k('y'),k('u'),k('i'),k('o'),k('p')],
         [k('h'),k('j'),k('k'),k('l'),k(';','',':')],
         [k('n'),k('m'),k(',','','<'),k('.','','>'),km('Bksp','backspace')],
         [kl('RSE','raise'),kt('Spc','space'),km('Enter','enter'),kl('ADJ','adj'),kf('FUNC','func')]],
    },
    lower:{
      l:[[km('Esc','escape'),k('1','','!'),k('2','','@'),k('3','','#'),k('4','','$'),k('5','','%')],
         [k('`'),k('-'),k('='),k('[','','{'),k(']','','}'),k('\\')],
         [k('~'),k('_'),k('+'),k('('),k(')'),k('|')],
         [km('Ctrl','ctrl'),km('Alt','alt'),kt('Spc','space'),kl('LWR','lower'),_(),_()]],
      r:[[k('6','','^'),k('7','','&'),k('8','','*'),k('9','','('),k('0','',')')],
         [k("'",'','"'),k('/','','?'),k(';','',':'),k('='),k('+')],
         [k('-'),k('_'),k('<'),k('>'),km('Del','delete')],
         [kl('RSE','raise'),kt('Spc','space'),km('Enter','enter'),kl('ADJ','adj'),kf('FUNC','func')]],
    },
    raise:{
      l:[[k('F1'),k('F2'),k('F3'),k('F4'),k('F5'),k('F6')],
         [k('F7'),k('F8'),k('F9'),k('F10'),k('F11'),k('F12')],
         [km('Esc','escape'),km('Tab','tab'),k('Ins'),k('Home'),k('End'),k('PgUp')],
         [km('Ctrl','ctrl'),km('Alt','alt'),kt('Spc','space'),kl('LWR','lower'),_(),_()]],
      r:[[km('←','arrow-left'),km('↓','arrow-down'),km('↑','arrow-up'),km('→','arrow-right'),k('PgDn')],
         [k('Cut'),k('Copy'),k('Paste'),k('Undo'),k('Redo')],
         [k('`'),k('\\'),k('|'),_(),km('Bksp','backspace')],
         [kl('RSE','raise'),kt('Spc','space'),km('Enter','enter'),kl('ADJ','adj'),kf('FUNC','func')]],
    },
  }},

  // V3 ── 5+5 symmetric ───────────────────────────────────────────────────────
  v3: { sL:ST.L5, sR:ST.R5, layers:{
    base:{
      l:[[k('q'),k('w'),k('e'),k('r'),k('t')],
         [k('a'),k('s'),k('d'),k('f'),k('g')],
         [k('z'),k('x'),k('c'),k('v'),k('b')],
         [km('Shift','shift'),kt('Spc','space'),kl('LWR','lower'),km('Ctrl','ctrl'),km('Alt','alt')]],
      r:[[k('y'),k('u'),k('i'),k('o'),k('p')],
         [k('h'),k('j'),k('k'),k('l'),k(';','',':')],
         [k('n'),k('m'),k(',','','<'),k('.','','>'),km('Bksp','backspace')],
         [kl('RSE','raise'),km('Enter','enter'),kt('Spc','space'),kf('FUNC','func'),kl('ADJ','adj')]],
    },
    lower:{
      l:[[k('1','','!'),k('2','','@'),k('3','','#'),k('4','','$'),k('5','','%')],
         [k('`'),k('-','','_'),k('=','','+'),k('[','','{'),k(']','','}')],
         [k('~'),k('\\','','|'),k('('),k(')'),k("'",'','"')],
         [km('Shift','shift'),kt('Spc','space'),kl('LWR','lower'),km('Esc','escape'),km('Tab','tab')]],
      r:[[k('6','','^'),k('7','','&'),k('8','','*'),k('9','','('),k('0','',')')],
         [k('/','','?'),k(';','',':'),k("'",'','"'),k('<'),k('>')],
         [k('!'),k('@'),k('#'),k('$'),km('Del','delete')],
         [kl('RSE','raise'),km('Enter','enter'),kt('Spc','space'),kf('FUNC','func'),kl('ADJ','adj')]],
    },
    raise:{
      l:[[k('F1'),k('F2'),k('F3'),k('F4'),k('F5')],
         [k('F6'),k('F7'),k('F8'),k('F9'),k('F10')],
         [k('F11'),k('F12'),k('Ins'),k('Home'),k('PgUp')],
         [km('Shift','shift'),kt('Spc','space'),kl('LWR','lower'),km('Ctrl','ctrl'),km('Alt','alt')]],
      r:[[km('←','arrow-left'),km('↓','arrow-down'),km('↑','arrow-up'),km('→','arrow-right'),k('PgDn')],
         [k('Home'),k('End'),k('PgUp'),k('PgDn'),k('End')],
         [k('Cut'),k('Copy'),k('Paste'),k('Undo'),km('Bksp','backspace')],
         [kl('RSE','raise'),km('Enter','enter'),kt('Spc','space'),kf('FUNC','func'),kl('ADJ','adj')]],
    },
  }},

  // V4 ── 5+5 + layer-aware top row ───────────────────────────────────────────
  // Top row: 8 keys total — 2 fixed anchors (Tab, Esc) + 6 layer-aware slots
  // null in top slot = transparent (&trans) — shown dimmed, falls through to base
  // V4 = V3 exactly, plus a layer-aware top row
  // Main rows are identical to V3 — only topSlots differ per layer
  v4: { sL:ST.L5, sR:ST.R5, topRow: true,
    anchors: [km('Tab','tab'), km('Esc','escape')],
    layers:{
    base:{
      topSlots:[k('`'), k('^'), km('Ctrl','ctrl'), km('Alt','alt'), km('Cmd','meta'), k('\\')],
      l:[[k('q'),k('w'),k('e'),k('r'),k('t')],
         [k('a'),k('s'),k('d'),k('f'),k('g')],
         [k('z'),k('x'),k('c'),k('v'),k('b')],
         [km('Shift','shift'),kt('Spc','space'),kl('LWR','lower'),km('Ctrl','ctrl'),km('Alt','alt')]],
      r:[[k('y'),k('u'),k('i'),k('o'),k('p')],
         [k('h'),k('j'),k('k'),k('l'),k(';','',':')],
         [k('n'),k('m'),k(',','','<'),k('.','','>'),km('Bksp','backspace')],
         [kl('RSE','raise'),km('Enter','enter'),kt('Spc','space'),kf('FUNC','func'),kl('ADJ','adj')]],
    },
    lower:{
      topSlots:[k('('), k(')'), k('['), k(']'), k('{'), k('}')],
      l:[[k('1','','!'),k('2','','@'),k('3','','#'),k('4','','$'),k('5','','%')],
         [k('`'),k('-','','_'),k('=','','+'),k('[','','{'),k(']','','}')],
         [k('~'),k('\\','','|'),k('('),k(')'),k("'",'','"')],
         [km('Shift','shift'),kt('Spc','space'),kl('LWR','lower'),km('Esc','escape'),km('Tab','tab')]],
      r:[[k('6','','^'),k('7','','&'),k('8','','*'),k('9','','('),k('0','',')')],
         [k('/','','?'),k(';','',':'),k("'",'','"'),k('<'),k('>')],
         [k('!'),k('@'),k('#'),k('$'),km('Del','delete')],
         [kl('RSE','raise'),km('Enter','enter'),kt('Spc','space'),kf('FUNC','func'),kl('ADJ','adj')]],
    },
    raise:{
      topSlots:[k('F1'),k('F2'),k('F3'),k('F4'),k('F5'),k('F6')],
      l:[[k('F7'),k('F8'),k('F9'),k('F10'),k('F11')],
         [k('F12'),k('Ins'),k('Home'),k('PgUp'),k('PgDn')],
         [k('End'),k('Cut'),k('Copy'),k('Paste'),k('Undo')],
         [km('Shift','shift'),kt('Spc','space'),kl('LWR','lower'),km('Ctrl','ctrl'),km('Alt','alt')]],
      r:[[km('←','arrow-left'),km('↓','arrow-down'),km('↑','arrow-up'),km('→','arrow-right'),k('PgDn')],
         [k('Home'),k('End'),k('PgUp'),k('PgDn'),k('End')],
         [k('Cut'),k('Copy'),k('Paste'),k('Undo'),km('Bksp','backspace')],
         [kl('RSE','raise'),km('Enter','enter'),kt('Spc','space'),kf('FUNC','func'),kl('ADJ','adj')]],
    },
  }},

  // V5 ── hold-tap: home row mods + layer-on-hold thumbs ─────────────────────
  // Tap = primary label  |  Hold = coloured strip + small label
  // Home row mods (SCAG, index→pinky):
  //   Left  f=⇧Shift  d=⌃Ctrl  s=⌥Alt  a=⌘Cmd
  //   Right j=⇧Shift  k=⌃Ctrl  l=⌥Alt  ;=⌘Cmd
  // Thumb hold:
  //   Left  Spc  → hold = LWR
  //   Right Enter→ hold = RSE  |  Right Spc → hold = FUNC
  // Result: 2 thumb keys per side — no dedicated layer key column needed
  v5: { sL:ST.L5, sR:ST.R5, topRow: true,
    anchors:[km('Tab','tab'), km('Esc','escape')],
    layers:{
    base:{
      topSlots:[k('`'), k('^'), km('Ctrl','ctrl'), km('Alt','alt'), km('Cmd','meta'), k('\\')],
      l:[
        [k('q'), k('w'), k('e'), k('r'), k('t')],
        [kht('a','a','⌘','hrm-cmd'),  kht('s','s','⌥','hrm-alt'),
         kht('d','d','⌃','hrm-ctrl'), kht('f','f','⇧','hrm-shift'), k('g')],
        [k('z'), k('x'), k('c'), k('v'), k('b')],
        [km('Shift','shift'), kht('Spc','space','LWR','lhold')],
      ],
      r:[
        [k('y'), k('u'), k('i'), k('o'), k('p')],
        [k('h'), kht('j','j','⇧','hrm-shift'), kht('k','k','⌃','hrm-ctrl'),
         kht('l','l','⌥','hrm-alt'), kht(';',';','⌘','hrm-cmd')],
        [k('n'), k('m'), k(',','','<'), k('.','','>'), km('Bksp','backspace')],
        [kht('Enter','enter','RSE','lhold'), kht('Spc','space','FUNC','lhold')],
      ],
    },
    lower:{
      topSlots:[k('('), k(')'), k('['), k(']'), k('{'), k('}')],
      l:[
        [k('1','','!'), k('2','','@'), k('3','','#'), k('4','','$'), k('5','','%')],
        [kht('a','a','⌘','hrm-cmd'),  kht('s','s','⌥','hrm-alt'),
         kht('d','d','⌃','hrm-ctrl'), kht('f','f','⇧','hrm-shift'), k('`','','~')],
        [k('\\','','|'), k('-','','_'), k('=','','+'), k("'",'','"'), k('/','','?')],
        [km('Shift','shift'), kht('Spc','space','LWR','lhold')],
      ],
      r:[
        [k('6','','^'), k('7','','&'), k('8','','*'), k('9'), k('0')],
        [k('h'), kht('j','j','⇧','hrm-shift'), kht('k','k','⌃','hrm-ctrl'),
         kht('l','l','⌥','hrm-alt'), kht(';',';','⌘','hrm-cmd')],
        [k('<'), k('>'), k('~'), k('`'), km('Del','delete')],
        [kht('Enter','enter','RSE','lhold'), kht('Spc','space','FUNC','lhold')],
      ],
    },
    raise:{
      topSlots:[k('F1'), k('F2'), k('F3'), k('F4'), k('F5'), k('F6')],
      l:[
        [k('F7'), k('F8'), k('F9'), k('F10'), k('F11')],
        [kht('a','a','⌘','hrm-cmd'),  kht('s','s','⌥','hrm-alt'),
         kht('d','d','⌃','hrm-ctrl'), kht('f','f','⇧','hrm-shift'), k('F12')],
        [k('Home'), k('PgUp'), k('PgDn'), k('End'), k('Ins')],
        [km('Shift','shift'), kht('Spc','space','LWR','lhold')],
      ],
      r:[
        [km('←','arrow-left'), km('↓','arrow-down'), km('↑','arrow-up'), km('→','arrow-right'), k('PgDn')],
        [k('h'), kht('j','j','⇧','hrm-shift'), kht('k','k','⌃','hrm-ctrl'),
         kht('l','l','⌥','hrm-alt'), kht(';',';','⌘','hrm-cmd')],
        [k('Cut'), k('Copy'), k('Paste'), k('Undo'), km('Bksp','backspace')],
        [kht('Enter','enter','RSE','lhold'), kht('Spc','space','FUNC','lhold')],
      ],
    },
  }},

};

// ── Geometry ─────────────────────────────────────────────────────────────────
function totalHeight(v) {
  const hasTop = VARIANTS[v].topRow;
  const topExtra = hasTop ? C.KH + C.RG : 0;
  return 2*C.P + topExtra + 4*(C.KH+C.RG) + 1.0*C.KH;
}

function topRowKeyW(n) {
  return (C.SW - 2*C.P - (n-1)*C.KG) / n;
}

function halfKeyW(n) {
  return (HW - (n-1)*C.KG) / n;
}

// ── Compute positioned keys ───────────────────────────────────────────────────
function compute(variantId, layer) {
  const v    = VARIANTS[variantId];
  const data = v.layers[layer] || v.layers.base;
  const out  = [];
  const mainOffsetY = v.topRow ? C.P + C.KH + C.RG : C.P;

  // Top row — fixed anchors (Tab, Esc) + layer-specific slots
  if (v.topRow) {
    const topKeys = [...(v.anchors||[]), ...(data.topSlots||[])];
    const n  = topKeys.length;
    const kw = topRowKeyW(n);
    topKeys.forEach((key, i) => {
      if (!key || !key.l) return;
      out.push({key, x: C.P + i*(kw+C.KG), y: C.P, w: kw, h: C.KH});
    });
  }

  // Left half
  computeHalf(data.l, v.sL, C.P, mainOffsetY, out);
  // Right half
  computeHalf(data.r, v.sR, C.P + HW + C.HG, mainOffsetY, out);

  return out;
}

function computeHalf(rows, stagger, startX, startY, out) {
  rows.forEach((row, ri) => {
    const n    = row.length;
    const kw   = halfKeyW(n);
    const baseY = startY + ri*(C.KH+C.RG);
    let x = startX;
    row.forEach((key, ci) => {
      if (!key.l) { x += kw + C.KG; return; }
      const y = baseY + (stagger[ci]||0)*C.KH;
      out.push({key, x, y, w:kw, h:C.KH, isTop:false});
      x += kw + C.KG;
    });
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(vid, layer) {
  const canvas = document.getElementById('kb-'+vid);
  const info   = document.getElementById('info-'+vid);
  const desc   = document.getElementById('desc-'+vid);
  const v      = VARIANTS[vid];
  const h      = totalHeight(vid);

  canvas.innerHTML = '';
  canvas.style.height = h + 'px';

  // Top-row separator
  if (v.topRow) {
    const sep = document.createElement('div');
    sep.className = 'toprow-sep';
    sep.style.top = (C.P + C.KH + C.RG/2) + 'px';
    canvas.appendChild(sep);
  }

  // Half gap line
  const gl = document.createElement('div');
  gl.className = 'gap-line';
  gl.style.left = (C.P + HW + C.HG/2) + 'px';
  gl.style.top  = v.topRow ? (C.P + C.KH + C.RG) + 'px' : 0;
  canvas.appendChild(gl);

  compute(vid, layer).forEach(({key, x, y, w, h}) => {
    const el = document.createElement('div');
    const extra = key.isTop ? ' toprow' : '';  // keep for reference
    el.className = 'key ' + key.c + (arguments[0] && key.c === '' ? '' : '');
    // re-derive classes
    let cls = 'key';
    if (key.c) cls += ' ' + key.c;
    el.className = cls;
    el.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px`;

    const lbl = document.createElement('span');
    lbl.className = 'lbl';
    lbl.textContent = key.l;
    el.appendChild(lbl);
    if (key.s) {
      const sub = document.createElement('span');
      sub.className = 'sub';
      sub.textContent = key.s;
      el.appendChild(sub);
    }
    // hold-tap secondary label
    if (key.h) {
      const hl = document.createElement('span');
      hl.className = 'hold-lbl';
      hl.textContent = key.h;
      el.appendChild(hl);
    }
    canvas.appendChild(el);
  });

  // Info bar
  const lData = v.layers[layer]||v.layers.base;
  const lCols = lData.l[0].filter(k=>k.l).length;
  const rCols = lData.r[0].filter(k=>k.l).length;
  const lkw   = Math.round(halfKeyW(lData.l[0].length));
  const rkw   = Math.round(halfKeyW(lData.r[0].length));
  const topKeys = v.topRow ? [...(v.anchors||[]), ...(lData.topSlots||[])] : null;
  const tkw   = topKeys ? Math.round(topRowKeyW(topKeys.length)) : null;
  info.innerHTML =
    `cols: <span>${lCols}+${rCols}</span> &nbsp;·&nbsp; ` +
    `main key: <span>~${lkw}px</span> &nbsp;·&nbsp; ` +
    (tkw ? `top key: <span>~${tkw}px</span> &nbsp;·&nbsp; ` : '') +
    `layer: <span>${layer.toUpperCase()}</span>`;

  // Description
  desc.innerHTML = DESCS[vid]?.[layer] || DESCS[vid]?.base || '';
}

// ── Descriptions ─────────────────────────────────────────────────────────────
const DESCS = {
  v1:{
    base:`<strong>V1 · 6+7 current.</strong> Left ~23px, right ~19px. <span class="warn">Asymmetric — right thumb hits narrower keys.</span> <span class="tag">[</span><span class="tag">]</span><span class="tag">Enter</span><span class="tag">'</span> occupy full outer columns on base.`,
    lower:`<strong>V1 LOWER.</strong> Numbers left, symbols right. 7 cols on right is very dense.`,
    raise:`<strong>V1 RAISE.</strong> F-keys left, nav right. 7 cols still cramped on right.`,
  },
  v2:{
    base:`<strong>V2 · 6+5.</strong> Left ~23px, right ~28px. <span class="warn">Still asymmetric</span> but right thumb is much better. <span class="tag">Enter</span> moves to right thumb. <span class="tag">[</span><span class="tag">]</span><span class="tag">'</span><span class="tag">/</span> move to LOWER.`,
    lower:`<strong>V2 LOWER.</strong> Brackets + parens on left, numbers + operators on right. One thumb holds LWR, other taps.`,
    raise:`<strong>V2 RAISE.</strong> Esc+Tab reclaimed on left raise row. Arrows + edit shortcuts on right.`,
  },
  v3:{
    base:`<strong>V3 · 5+5 symmetric.</strong> Both ~28px. <span class="good">Fully symmetric.</span> Shift → left thumb. Enter → right thumb. No outer columns. All symbols on layers.`,
    lower:`<strong>V3 LOWER.</strong> Numbers 1–5 left / 6–0 right. All brackets, quotes, operators on this layer. Esc+Tab on left thumb (always available for coding).`,
    raise:`<strong>V3 RAISE.</strong> F1–F10 left, arrows + nav + edit shortcuts right.`,
  },
  v4:{
    base:`<strong>V4 · 5+5 + layer-aware top row.</strong> Main keys ~28px. Top row ~39px — <span class="good">largest keys on the keyboard.</span> BASE top: <span class="tag">Tab</span><span class="tag">Esc</span><span class="tag">\`</span><span class="tag">^</span><span class="tag">Ctrl</span><span class="tag">Alt</span><span class="tag">Cmd</span><span class="tag">\\</span> — the coding essentials, always one fat tap. Thumb cluster simplified: Shift Spc LWR / RSE Enter Spc.`,
    lower:`<strong>V4 LOWER top row: all brackets in one line.</strong> <span class="tag">(</span><span class="tag">)</span><span class="tag">[</span><span class="tag">]</span><span class="tag">{</span><span class="tag">}</span><span class="tag">&lt;</span><span class="tag">&gt;</span> — hold LWR, tap any bracket type without switching. Numbers + operators fill the main 5+5 area.`,
    raise:`<strong>V4 RAISE top row: F1–F8 always visible.</strong> No need for a separate FUNC layer for F-keys. F9–F12 + nav on left main rows. Arrows + media on right. <span class="good">FUNC layer can now be repurposed for IDE shortcuts.</span>`,
  },
  v5:{
    base:`<strong>V5 · hold-tap.</strong> Every coloured key has two actions. <strong>Tap</strong> = primary label. <strong>Hold (~150ms)</strong> = coloured bottom label. Home row mods: <span class="tag">a</span>=⌘ <span class="tag">s</span>=⌥ <span class="tag">d</span>=⌃ <span class="tag">f</span>=⇧ (mirror on right j/k/l/;). Thumb: <span class="tag">Spc</span> hold = LWR, <span class="tag">Enter</span> hold = RSE, second <span class="tag">Spc</span> hold = FUNC. <span class="good">No dedicated layer key column — thumb cluster shrinks to 2 keys per side.</span> Ctrl+C becomes: hold d (⌃) + tap c.`,
    lower:`<strong>V5 LOWER.</strong> Home row mods stay active on every layer — hold <span class="tag">f</span> for Shift even on LOWER. Brackets on top row. Numbers on main rows.`,
    raise:`<strong>V5 RAISE.</strong> Home row mods on raise too. F1–F6 on top row, F7–F12 on left main. Arrows on right. <span class="good">Ctrl+arrow (word jump) = hold d + tap arrow.</span>`,
  },
};

// ── State ─────────────────────────────────────────────────────────────────────
let curV = 'v1', curL = 'base';

function setVariant(v) {
  curV = v;
  ['v1','v2','v3','v4','v5'].forEach(id => {
    document.getElementById('wrap-'+id).style.display = id===v ? '' : 'none';
    document.getElementById('desc-'+id).style.display = id===v ? '' : 'none';
    document.getElementById('v-'+id).classList.toggle('active', id===v);
    const leg = document.getElementById('legend-'+id);
    if (leg) leg.style.display = id===v ? 'flex' : 'none';
  });
  render(curV, curL);
}

function setLayer(l) {
  curL = l;
  ['base','lower','raise'].forEach(id => {
    document.getElementById('l-'+id).classList.toggle('active', id===l);
  });
  render(curV, curL);
}

['v1','v2','v3','v4','v5'].forEach(v =>
  document.getElementById('v-'+v).addEventListener('click', () => setVariant(v)));
['base','lower','raise'].forEach(l =>
  document.getElementById('l-'+l).addEventListener('click', () => setLayer(l)));

// Initial render all variants (sets canvas heights)
['v1','v2','v3','v4','v5'].forEach(v => render(v, 'base'));
</script>
