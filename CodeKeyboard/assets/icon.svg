<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108">
  <rect width="108" height="108" rx="24" fill="#1e1e1e"/>

  <!-- Left half keyboard -->
  <rect x="10" y="26" width="36" height="58" rx="5" fill="#2d2d2d"/>
  <!-- Left stagger keys -->
  <rect x="14" y="30" width="12" height="8" rx="2" fill="#444"/>
  <rect x="14" y="42" width="12" height="8" rx="2" fill="#444"/>
  <rect x="17" y="54" width="12" height="8" rx="2" fill="#444"/>
  <rect x="20" y="66" width="12" height="8" rx="2" fill="#444"/>

  <!-- Right half keyboard -->
  <rect x="62" y="26" width="36" height="58" rx="5" fill="#2d2d2d"/>
  <!-- Right stagger keys -->
  <rect x="82" y="30" width="12" height="8" rx="2" fill="#444"/>
  <rect x="78" y="42" width="12" height="8" rx="2" fill="#444"/>
  <rect x="74" y="54" width="12" height="8" rx="2" fill="#444"/>
  <rect x="70" y="66" width="12" height="8" rx="2" fill="#444"/>

  <!-- < / > symbol in center gap -->
  <text x="54" y="60" text-anchor="middle" dominant-baseline="central"
        fill="#4a9eff" font-family="monospace" font-size="18" font-weight="900">&lt;/&gt;</text>
</svg>
